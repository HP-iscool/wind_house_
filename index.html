<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>아이올로스의 바람의 집</title>

  <style>
    body {
      background: radial-gradient(circle at top, #000 60%, #050510);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin-top: 40px;
      transition: 0.3s;
    }

    h1 {
      color: #6ec6ff;
      font-weight: 900;
      font-size: 30px;
      text-shadow: 0 0 10px rgba(110,198,255,0.6), 0 0 25px rgba(110,198,255,0.3);
      margin-bottom: 20px;
    }

    button {
      margin: 6px;
      padding: 10px 16px;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
      color: #e0e0ff;
      box-shadow: 0 0 8px rgba(110,198,255,0.2);
      transition: 0.2s;
      font-weight: 600;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(110,198,255,0.5);
    }

    #game {
      max-width: 600px;
      margin: auto;
      position: relative;
    }

    #pouch {
      position: relative;
      height: 250px;
      margin-top: 20px;
    }

    .hidden { display: none; }

    .gray {
      color: #9a9a9a;
      font-size: 12px;
    }

    #minimap {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 200px;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(110,198,255,0.3);
      border-radius: 10px;
      font-size: 10px;
    }

    .row {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
    }

    .row.rev {
      flex-direction: row-reverse;
    }

    .room {
      flex: 1;
      text-align: center;
      padding: 2px;
      opacity: 0.4;
    }

    .current {
      color: #6ec6ff;
      opacity: 1;
      font-weight: bold;
      text-shadow: 0 0 5px #6ec6ff;
    }
  </style>
</head>
<body>

<div id="game">

  <h1>아이올로스의 바람의 집</h1>

  <div id="text"></div>

  <br>
  <button onclick="move(-1)">⬅ 뒤로</button>
  <button onclick="stay()">⏸ 멈춤</button>
  <button onclick="move(1)">앞으로 ➡</button>

  <div id="pouch" class="hidden"></div>

</div>

<div id="minimap"></div>

<script>
let rooms=["입구","방1","방2","방3","방4","복도","방5","방6","방7","방8","복도2","방9","방10","방11","출구"];

let roomDesc=[
"철문이 반쯤 열린 채 숨을 쉬듯 흔들린다.","벽이 너무 가까워 보인다.","바람이 한 방향으로만 흐른다.","천장이 미세하게 내려온 듯하다.","조명이 불규칙하게 맥동한다.","복도가 끝없이 늘어지는 느낌이다.","누군가 지나간 흔적이 있다.","벽 안에서 소리가 난다.","문 없는 문틀이 어긋나 있다.","공기가 무겁게 눌러온다.","바닥이 미세하게 기울어진다.","벽이 숨 쉬는 것처럼 움직인다.","길이 기억보다 길다.","빛이 출구를 속이고 있다."
];

let visitCount=Array(rooms.length).fill(0);
let lastMoveDir=0;

let windText=["바람이 분다...","어디선가 숨결이 스친다...","공기가 뒤틀린다...","무언가 지나갔다...","바람이 이름을 부른다..."];

let pouchMessages=["안쪽에서 속삭임이 들린다...","손끝이 먼저 반응한다.","이미 당신을 알고 있는 느낌이다.","왜 이걸 놓을 수 없을까?","보석이 들어 있을까?","로또 복권일지도 몰라!"];

let current=0;
let pouchRoom=Math.floor(Math.random()*(rooms.length-2))+1;

let hasPouch=false;
let seenPouch=false;
let gameEnded=false;
let suppressPrompt=false;
let noCount=0;
let promptActive=false;
let respondedOnce=false;

const text=document.getElementById("text");
const pouchUI=document.getElementById("pouch");
const minimap=document.getElementById("minimap");

function renderMap(){
  let layout=[[14],[12,13,11],[10],[6,7,8,9],[5,4,3,2,1],[0]];
  let rev=[false,true,false,false,true,false];

  let html="";
  layout.forEach((row,i)=>{
    html+=`<div class='row ${rev[i]?"rev":""}'>`;
    row.forEach(x=>{
      html+=`<div class='room ${x===current?"current":""}'>${rooms[x]}</div>`;
    });
    html+=`</div>`;
  });

  minimap.innerHTML=html;
}

function getRoomText(i){
  let base=roomDesc[i];
  if(visitCount[i]===0) return base;
  if(lastMoveDir===-1) return base+" (되돌아온 느낌)";
  if(visitCount[i]>1) return base+" (이질감)";
  return base;
}

function update(){
  if(gameEnded) return;

  visitCount[current]++;

  let wind=windText[Math.floor(Math.random()*windText.length)];
  let desc=getRoomText(current);

  text.innerHTML=`📍 ${rooms[current]}<br><span class='gray'>${desc}</span><br><br>🌬️ ${wind}`;

  renderMap();

  if(suppressPrompt) return;

  if(current===pouchRoom&&!seenPouch){
    seenPouch=true;
    promptActive=true;
    respondedOnce=false;

    pouchUI.classList.remove("hidden");
    pouchUI.innerHTML=`
      <p>🧳 바닥에 주머니가 있다</p>
      <button onclick="pick(true)">줍는다</button>
      <button onclick="pick(false)">지나친다</button>
    `;
    return;
  }

  if(hasPouch){
    pouchUI.classList.remove("hidden");

    let msgIndex=Math.min(noCount,pouchMessages.length-1);

    let exitBtn="";
    if(Math.random()>0.55) exitBtn=`<button onclick="exitGame()">🚪 출구</button>`;

    let dynamicCount=6+noCount*2;
    let yBtns="";

    for(let i=0;i<dynamicCount;i++){
      let t=Math.random()*200;
      let l=Math.random()*400;
      yBtns+=`<button style='position:absolute;top:${t}px;left:${l}px' onclick="openPouch(true)">열어볼까?</button>`;
    }

    pouchUI.innerHTML=`
      <p>❗ 주머니를 여시겠습니까?</p>
      <p class='gray'>${pouchMessages[msgIndex]}</p>
      ${yBtns}
      <button onclick="openPouch(false)">아니오</button>
      ${exitBtn}
    `;
  } else {
    pouchUI.classList.add("hidden");
  }

  if(current===rooms.length-1) endGame();
}

function move(dir){
  if(gameEnded) return;
  if(promptActive&&!respondedOnce) return;

  if(dir>0) noCount++;
  lastMoveDir=dir;
  current+=dir;

  if(current<0) current=0;
  if(current>=rooms.length) current=rooms.length-1;

  update();
}

function stay(){
  if(gameEnded) return;
  if(promptActive&&!respondedOnce) return;
  update();
}

function pick(c){
  promptActive=false;
  respondedOnce=true;
  pouchUI.classList.add("hidden");
  if(c) hasPouch=true;
  update();
}

function openPouch(c){
  if(gameEnded) return;

  respondedOnce=true;

  if(!c){
    noCount++;
    pouchUI.classList.add("hidden");
    suppressPrompt=true;
    setTimeout(()=>{suppressPrompt=false;update();},500);
    return;
  }

  document.body.innerHTML=`<h1>🌪️</h1><p>바람이 당신을 끌어올린다</p><h2>💀 BAD ENDING</h2>`;
}

function exitGame(){
  let roll=Math.random();
  if(roll<0.4){current=rooms.length-1;endGame();}
  else{current=Math.floor(Math.random()*(rooms.length-2));update();}
}

function endGame(){
  gameEnded=true;
  pouchUI.classList.add("hidden");
  text.innerHTML=`📍 출구 도착<br><br>${hasPouch?"🏁 TRUE END":"🏁 NORMAL END"}<br><span class='gray'>주머니:${hasPouch?"O":"X"}</span>`;
  renderMap();
}

update();
</script>

</body>
</html>

</body>
</html>
